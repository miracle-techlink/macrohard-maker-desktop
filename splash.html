<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 480px; height: 300px;
    background: #1a1a2e;
    border-radius: 12px;
    border: 1px solid #2a2a4e;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    color: #fff;
    overflow: hidden;
  }
  .logo-area { margin-bottom: 24px; text-align: center; }
  .logo-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #1890FF, #FF6B35);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; margin: 0 auto 12px;
  }
  h1 { font-size: 20px; font-weight: 600; letter-spacing: 1px; }
  p { font-size: 12px; color: #6B6F77; margin-top: 4px; }
  .loading-bar {
    width: 240px; height: 3px;
    background: #2a2a4e;
    border-radius: 2px;
    overflow: hidden;
    margin-top: 32px;
  }
  .loading-fill {
    height: 100%;
    background: linear-gradient(90deg, #1890FF, #FF6B35);
    border-radius: 2px;
    animation: loading 2s ease-in-out infinite;
  }
  @keyframes loading {
    0% { width: 0%; margin-left: 0; }
    50% { width: 60%; margin-left: 20%; }
    100% { width: 0%; margin-left: 100%; }
  }
  .status { font-size: 11px; color: #546E7A; margin-top: 12px; }
</style>
</head>
<body>
  <div class="logo-area">
    <div class="logo-icon">⚙</div>
    <h1>MacroHard Maker</h1>
    <p>连续碳纤维3D打印路径规划</p>
  </div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
  <p class="status">正在启动计算引擎...</p>
</body>
</html>
